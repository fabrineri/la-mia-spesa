<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SuperSpesa Premium Cloud 🛒</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0B0E14">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0F1319 0%, #080A0F 100%);
            --panel-bg: rgba(22, 28, 38, 0.8);
            --panel-border: rgba(255, 255, 255, 0.05);
            --text-main: #FFFFFF;
            --text-muted: #8E9AA8;
            --neon-blue: #00E5FF;
            --neon-purple: #9D4EDD;
            --neon-green: #39FF14;
            --neon-red: #FF3131;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 16px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin-bottom: 40px;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-top: 10px;
            margin-bottom: 24px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CARD STILE NEUMORFICO/GLASS */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            color: var(--neon-blue);
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            position: relative;
        }

        /* INPUT ACCATTIVANTI */
        input[type="text"], input[type="number"], select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="text"]::placeholder, input[type="number"]::placeholder {
            color: var(--text-muted);
        }

        input:focus, select:focus {
            border-color: var(--neon-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        #itemInput { flex: 2; min-width: 140px; }
        #categoryInput { flex: 1.3; min-width: 110px; background-color: #161C26; }
        #qtyInput { width: 75px; text-align: center; }
        #priceInput { width: 95px; }

        /* PULSANTI SMART */
        button.add-btn {
            background: linear-gradient(135deg, var(--neon-blue), #00A3FF);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            width: 52px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, opacity 0.2s;
        }
        button.add-btn:active { transform: scale(0.95); opacity: 0.9; }

        /* NUOVA TENDINA AUTOCOMPLETAMENTO AD ALTO CONTRASTO */
        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #121824;
            border: 1px solid var(--neon-blue);
            border-radius: 16px;
            z-index: 99999 !important;
            max-height: 240px;
            overflow-y: auto;
            box-shadow: 0 12px 40px rgba(0, 229, 255, 0.15);
            margin-top: 6px;
            display: none;
        }

        .suggestion-item {
            padding: 15px 16px;
            cursor: pointer;
            font-size: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: transparent;
            color: white;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }

        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:active { background: linear-gradient(90deg, rgba(0, 229, 255, 0.1), transparent); }
        .suggestion-cat { font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.06); padding: 4px 8px; border-radius: 8px; }

        /* CHIPS NEON */
        .frequent-chips-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .frequent-chip {
            background: rgba(157, 78, 221, 0.12);
            color: #D6A4FF;
            border: 1px solid rgba(157, 78, 221, 0.2);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
        }
        .frequent-chip:active { background: rgba(157, 78, 221, 0.3); transform: scale(0.95); }

        /* GESTORE CORSIE */
        .category-manager-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-manager-content { display: none; margin-top: 14px; }
        .category-manager-content.open { display: block; }
        .cat-list { display: flex; flex-direction: column; gap: 8px; padding: 0; margin: 10px 0 0 0; list-style: none; }
        .cat-chip {
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .cat-actions { display: flex; gap: 14px; align-items: center; }
        .move-btn { background: none; border: none; color: var(--neon-blue); cursor: pointer; font-size: 15px; padding: 4px; }
        .move-btn:disabled { color: #3A4454; }

        /* DESIGN LISTA DI COMPRE */
        .category-header {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--neon-blue);
            margin: 24px 0 8px 6px;
            display: flex;
            align-items: center;
        }

        .product-list {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            padding: 4px 14px;
            margin-bottom: 12px;
            list-style: none;
        }

        li.product-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        li.product-item:last-child { border-bottom: none; }

        .item-text { flex: 1; font-size: 16px; margin-left: 14px; cursor: pointer; color: white; transition: color 0.2s; }
        .item-details { font-size: 13px; color: var(--text-muted); margin-right: 12px; font-variant-numeric: tabular-nums; }

        /* SPUNTA DIGITALE STILE APPLE */
        .check-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 26px;
            height: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .completed .check-btn {
            background: var(--neon-green);
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }
        .completed .check-btn::after { content: "✓"; color: #000; font-size: 15px; font-weight: 900; }
        .completed .item-text { text-decoration: line-through; color: var(--text-muted); }

        .delete-btn { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 6px; transition: color 0.2s; }
        .delete-btn:active { color: var(--neon-red); }

        /* DASHBOARD BUDGET FLOATING STYLE */
        .budget-dashboard {
            background: linear-gradient(135deg, rgba(22, 28, 38, 0.95), rgba(12, 16, 24, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 16px;
            margin-top: 24px;
            display: none;
        }
        .budget-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 8px; color: var(--text-muted); }
        .budget-row:last-child { margin-bottom: 0; }
        .budget-row.total-highlight {
            font-size: 18px;
            font-weight: 700;
            color: white;
            border-top: 1px dashed rgba(255,255,255,0.1);
            padding-top: 10px;
            margin-top: 10px;
        }
        .success-text { color: var(--neon-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }

        /* BOTTONI AZIONE SOTTO */
        .action-buttons-container { display: flex; gap: 12px; margin-top: 16px; }
        .clear-btn {
            flex: 1;
            border: 1px solid transparent;
            border-radius: 14px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            text-align: center;
        }
        #clearCompletedBtn { background: rgba(0, 229, 255, 0.08); border-color: rgba(0, 229, 255, 0.2); color: var(--neon-blue); }
        #clearCompletedBtn:active { background: rgba(0, 229, 255, 0.2); }
        #resetAllBtn { background: rgba(255, 49, 49, 0.08); border-color: rgba(255, 49, 49, 0.2); color: var(--neon-red); }
        #resetAllBtn:active { background: rgba(255, 49, 49, 0.2); }
        
        .delete-cat-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; width: 52px; color: var(--text-muted); font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SuperSpesa Premium Cloud 🛒</h1>
        
        <div class="glass-panel">
            <div class="section-title">Supermercato Corrente</div>
            <div class="input-group" style="margin-bottom: 0;">
                <select id="marketSelect" style="flex: 1;" onchange="changeMarket()"></select>
                <button class="delete-cat-btn" onclick="deleteMarket()">🗑️</button>
            </div>
            
            <div class="section-title" style="margin-top: 16px; margin-bottom: 8px;">Nuovo Negozio</div>
            <div class="input-group" style="margin-bottom: 0;">
                <input type="text" id="newMarketInput" style="flex: 1;" placeholder="Es: Esselunga, Conad...">
                <button class="add-btn" style="background: linear-gradient(135deg, var(--neon-green), #22C55E);" onclick="addMarket()">+</button>
            </div>
        </div>
        
        <div class="glass-panel" style="padding: 16px 20px;">
            <div class="category-manager-title" onclick="toggleCatManager()">
                <span style="color: #9D4EDD; font-weight: 700;">⚙️ Configura Ordine Corsie</span>
                <span id="panelsign" style="color: var(--text-muted);">▶</span>
            </div>
            <div class="category-manager-content" id="catContent">
                <div class="input-group" style="margin-top: 10px; margin-bottom: 0;">
                    <input type="text" id="newCatInput" style="flex: 1;" placeholder="Nuovo reparto...">
                    <button class="add-btn" style="background: linear-gradient(135deg, var(--neon-purple), #7B2CBF); color: white;" onclick="addCategory()">+</button>
                </div>
                <ul class="cat-list" id="customCatList"></ul>
            </div>
        </div>

        <div class="glass-panel">
            <div class="section-title">Aggiungi Prodotto</div>
            <div class="input-group">
                <input type="text" id="itemInput" placeholder="Cosa ti serve?" autocomplete="off" autocorrect="off" spellcheck="false">
                <select id="categoryInput"></select>
                <div id="autocompleteList" class="autocomplete-suggestions"></div>
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <input type="number" id="qtyInput" placeholder="Qtà" min="1" value="1">
                <input type="number" id="priceInput" placeholder="Prezzo (€)" min="0" step="0.01">
                <button class="add-btn" style="flex: 1;" onclick="addItem()">+</button>
            </div>
        </div>

        <div class="frequent-products-zone" id="frequentZone" style="display: none; margin: 0 6px 16px 6px;">
            <div class="section-title" style="color: #9D4EDD;">⭐ Spessissimo in questo negozio:</div>
            <div class="frequent-chips-container" id="frequentChips"></div>
        </div>

        <div id="shoppingListContainer"></div>

        <div class="budget-dashboard" id="budgetDashboard">
            <div class="budget-row">
                <span>Totale stimato lista:</span>
                <span style="color: white; font-weight: 500;" id="estimatedTotal">0.00 €</span>
            </div>
            <div class="budget-row total-highlight">
                <span>Nel Carrello:</span>
                <span class="success-text" id="cartTotal">0.00 €</span>
            </div>
        </div>

        <div class="action-buttons-container">
            <button id="clearCompletedBtn" class="clear-btn" onclick="clearCompleted()">
                Svuota Carrello 🧹
            </button>
            <button id="resetAllBtn" class="clear-btn" onclick="resetAllList()">
                Azzera Lista 🗑️
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNbOMzuz-KvWp7krS-cWgSKpIq5cz1nZc",
            authDomain: "superspesa-2d469.firebaseapp.com",
            projectId: "superspesa-2d469",
            storageBucket: "superspesa-2d469.firebasestorage.app",
            messagingSenderId: "513253865523",
            appId: "1:513253865523:web:f4f8c8caaef2c5c1dd4b46"
        };

        firebase.initializeApp(firebaseConfig);
        const firestoreDB = firebase.firestore();
        const docRef = firestoreDB.collection("appData").doc("shoppingState");

        const defaultCategories = [
            "Ortofrutta 🍎", "Pane e Forno 🥖", "Dispensa 🍝", 
            "Carne e Pesce 🥩", "Latticini e Frigo 🧀", "Bevande 💧", 
            "Igiene e Casa 🧻", "Surgelati 🧊"
        ];

        const smartDictionary = [
            { name: "Mele", cat: "Ortofrutta 🍎", price: 1.99 }, { name: "Banane", cat: "Ortofrutta 🍎", price: 1.49 }, { name: "Insalata", cat: "Ortofrutta 🍎", price: 1.19 }, { name: "Pomodori", cat: "Ortofrutta 🍎", price: 2.49 },
            { name: "Pane", cat: "Pane e Forno 🥖", price: 1.20 }, { name: "Biscotti", cat: "Pane e Forno 🥖", price: 2.80 }, { name: "Crackers", cat: "Pane e Forno 🥖", price: 1.40 }, { name: "Cornetti", cat: "Pane e Forno 🥖", price: 2.50 },
            { name: "Pasta", cat: "Dispensa 🍝", price: 0.85 }, { name: "Riso", cat: "Dispensa 🍝", price: 1.99 }, { name: "Passata di pomodoro", cat: "Dispensa 🍝", price: 0.99 }, { name: "Olio d'oliva", cat: "Dispensa 🍝", price: 7.49 }, { name: "Zucchero", cat: "Dispensa 🍝", price: 1.25 }, { name: "Caffè", cat: "Dispensa 🍝", price: 3.20 },
            { name: "Petto di Pollo", cat: "Carne e Pesce 🥩", price: 6.50 }, { name: "Macinato", cat: "Carne e Pesce 🥩", price: 5.90 }, { name: "Salmone", cat: "Carne e Pesce 🥩", price: 8.90 }, { name: "Prosciutto", cat: "Carne e Pesce 🥩", price: 2.99 },
            { name: "Latte", cat: "Latticini e Frigo 🧀", price: 1.39 }, { name: "Mozzarella", cat: "Latticini e Frigo 🧀", price: 1.10 }, { name: "Yogurt", cat: "Latticini e Frigo 🧀", price: 0.99 }, { name: "Burro", cat: "Latticini e Frigo 🧀", price: 2.20 }, { name: "Uova", cat: "Latticini e Frigo 🧀", price: 1.89 },
            { name: "Acqua Naturale", cat: "Bevande 💧", price: 0.35 }, { name: "Acqua Frizzante", cat: "Bevande 💧", price: 0.35 }, { name: "Birra", cat: "Bevande 💧", price: 1.50 }, { name: "Vino", cat: "Bevande 💧", price: 4.50 }, { name: "Succo di frutta", cat: "Bevande 💧", price: 1.69 },
            { name: "Carta Igienica", cat: "Igiene e Casa 🧻", price: 3.50 }, { name: "Scottex", cat: "Igiene e Casa 🧻", price: 2.40 }, { name: "Sapone Piatti", cat: "Igiene e Casa 🧻", price: 1.80 }, { name: "Dentifricio", cat: "Igiene e Casa 🧻", price: 2.10 }, { name: "Sacco Spazzatura", cat: "Igiene e Casa 🧻", price: 1.50 },
            { name: "Gelato", cat: "Surgelati 🧊", price: 3.99 }, { name: "Piselli surgelati", cat: "Surgelati 🧊", price: 1.79 }, { name: "Pizza surgelata", cat: "Surgelati 🧊", price: 2.99 }, { name: "Bastoncini di pesce", cat: "Surgelati 🧊", price: 3.49 }
        ];

        let localState = {
            currentMarket: "Supermercato Standard",
            markets: {
                "Supermercato Standard": { categories: [...defaultCategories], items: [], history: {} }
            }
        };

        function getActiveMarket() { 
            if(!localState.markets[localState.currentMarket].history) {
                localState.markets[localState.currentMarket].history = {};
            }
            return localState.markets[localState.currentMarket]; 
        }

        function pushToCloud() { docRef.set(localState); }

        docRef.onSnapshot((doc) => {
            if (doc.exists) {
                localState = doc.data();
            } else {
                docRef.set(localState);
            }
            updateMarketSelectorUI();
            updateCategoryUI();
            renderList();
            renderFrequentChips();
        });

        function findEstimatedPriceGlobal(productName) {
            let latestPriceFound = 0;
            Object.keys(localState.markets).forEach(mName => {
                const mHistory = localState.markets[mName].history || {};
                if (mHistory[productName] && mHistory[productName].price > 0) {
                    latestPriceFound = mHistory[productName].price;
                }
            });
            if (latestPriceFound > 0) return latestPriceFound;
            const defaultMatch = smartDictionary.find(d => d.name.toLowerCase() === productName.toLowerCase());
            return defaultMatch ? defaultMatch.price : 0;
        }

        // SISTEMA DI ASCOLTO UNIVERSALE TASTI MOBILE AGGIORNATO
        const itemInput = document.getElementById('itemInput');
        ['input', 'keydown', 'keyup', 'change'].forEach(evt => {
            itemInput.addEventListener(evt, () => {
                searchAutocomplete();
            });
        });

        function searchAutocomplete() {
            const input = document.getElementById('itemInput');
            const listContainer = document.getElementById('autocompleteList');
            const filter = input.value.trim().toLowerCase();
            const activeCategories = getActiveMarket().categories;

            if (!filter || filter.length < 1) {
                listContainer.style.display = 'none';
                return;
            }

            const globalHistoryNames = new Set();
            Object.keys(localState.markets).forEach(mName => {
                Object.keys(localState.markets[mName].history || {}).forEach(name => globalHistoryNames.add(name));
            });

            const combinedDictionary = [...smartDictionary];
            globalHistoryNames.forEach(histName => {
                if(!combinedDictionary.some(d => d.name.toLowerCase() === histName.toLowerCase())) {
                    let foundCat = defaultCategories[2];
                    Object.keys(localState.markets).forEach(mName => {
                        if(localState.markets[mName].history[histName]) foundCat = localState.markets[mName].history[histName].category;
                    });
                    combinedDictionary.push({ name: histName, cat: foundCat });
                }
            });

            const matches = combinedDictionary.filter(item => 
                item.name.toLowerCase().includes(filter) && activeCategories.includes(item.cat)
            ).slice(0, 5);

            if (matches.length > 0) {
                listContainer.innerHTML = '';
                listContainer.style.display = 'block';
                
                matches.forEach(match => {
                    const estimatedPrice = findEstimatedPriceGlobal(match.name);
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `<span>${match.name} ${estimatedPrice > 0 ? `(~${estimatedPrice.toFixed(2)}€)` : ''}</span><span class="suggestion-cat">${match.cat}</span>`;
                    
                    const selectThis = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        selectSuggestion(match.name, match.cat);
                    };

                    div.addEventListener('touchstart', selectThis, { passive: false });
                    div.addEventListener('mousedown', selectThis);

                    listContainer.appendChild(div);
                });
            } else {
                listContainer.style.display = 'none';
            }

            const exactMatch = combinedDictionary.find(d => d.name.toLowerCase() === input.value.trim().toLowerCase());
            if (exactMatch) {
                const estPrice = findEstimatedPriceGlobal(exactMatch.name);
                document.getElementById('priceInput').value = estPrice > 0 ? estPrice : '';
                document.getElementById('categoryInput').value = exactMatch.cat;
            }
        }

        function selectSuggestion(name, category) {
            document.getElementById('itemInput').value = name;
            document.getElementById('categoryInput').value = category;
            document.getElementById('autocompleteList').style.display = 'none';
            
            const estPrice = findEstimatedPriceGlobal(name);
            document.getElementById('priceInput').value = estPrice > 0 ? estPrice : '';
            document.getElementById('itemInput').blur();
        }

        function renderFrequentChips() {
            const container = document.getElementById('frequentChips');
            const zone = document.getElementById('frequentZone');
            const history = getActiveMarket().history || {};
            const activeCategories = getActiveMarket().categories;

            const sortedHistory = Object.keys(history)
                .map(name => ({ name: name, ...history[name] }))
                .filter(item => activeCategories.includes(item.category))
                .sort((a, b) => b.count - a.count)
                .slice(0, 6);

            if (sortedHistory.length > 0) {
                zone.style.display = 'block';
                container.innerHTML = '';
                sortedHistory.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'frequent-chip';
                    const currentEst = findEstimatedPriceGlobal(item.name);
                    btn.innerText = `+ ${item.name} ${currentEst > 0 ? `(${currentEst.toFixed(2)}€)` : ''}`;
                    btn.onclick = () => {
                        getActiveMarket().items.push({
                            id: Date.now(),
                            name: item.name,
                            category: item.category,
                            qty: 1,
                            price: currentEst || 0,
                            completed: false
                        });
                        pushToCloud();
                    };
                    container.appendChild(btn);
                });
            } else {
                zone.style.display = 'none';
            }
        }

        ['touchstart', 'click'].forEach(evt => {
            document.addEventListener(evt, (e) => {
                if (e.target.id !== 'itemInput' && e.target.className !== 'suggestion-item') {
                    document.getElementById('autocompleteList').style.display = 'none';
                }
            });
        });

        function updateMarketSelectorUI() {
            const select = document.getElementById('marketSelect');
            select.innerHTML = '';
            Object.keys(localState.markets).forEach(marketName => {
                const opt = document.createElement('option');
                opt.value = marketName;
                opt.innerText = marketName;
                if(marketName === localState.currentMarket) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function changeMarket() {
            localState.currentMarket = document.getElementById('marketSelect').value;
            pushToCloud();
        }

        function addMarket() {
            const input = document.getElementById('newMarketInput');
            const name = input.value.trim();
            if (name !== '' && !localState.markets[name]) {
                localState.markets[name] = { categories: [...defaultCategories], items: [], history: {} };
                localState.currentMarket = name;
                input.value = '';
                pushToCloud();
            }
        }

        function deleteMarket() {
            const marketNames = Object.keys(localState.markets);
            if (marketNames.length <= 1) {
                alert("Devi avere almeno un supermercato attivo!");
                return;
            }
            if (confirm(`Vuoi davvero eliminare "${localState.currentMarket}"?`)) {
                delete localState.markets[localState.currentMarket];
                localState.currentMarket = Object.keys(localState.markets)[0];
                pushToCloud();
            }
        }

        function toggleCatManager() {
            const content = document.getElementById('catContent');
            const sign = document.getElementById('panelsign');
            content.classList.toggle('open');
            sign.innerText = content.classList.contains('open') ? "▼" : "▶";
        }

        function updateCategoryUI() {
            const select = document.getElementById('categoryInput');
            const catListElement = document.getElementById('customCatList');
            const currentCatList = getActiveMarket().categories;
            
            const savedSelection = select.value;
            select.innerHTML = '';
            currentCatList.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat;
                select.appendChild(opt);
            });
            if(savedSelection && currentCatList.includes(savedSelection)) select.value = savedSelection;

            catListElement.innerHTML = '';
            currentCatList.forEach((cat, index) => {
                const li = document.createElement('li');
                li.className = 'cat-chip';
                const isFirst = index === 0;
                const isLast = index === currentCatList.length - 1;

                li.innerHTML = `
                    <span>${cat}</span>
                    <div class="cat-actions">
                        <button class="move-btn" onclick="moveCategory(${index}, -1)" ${isFirst ? 'disabled' : ''}>▲</button>
                        <button class="move-btn" onclick="moveCategory(${index}, 1)" ${isLast ? 'disabled' : ''}>▼</button>
                        <button class="delete-cat-btn" style="border:none; background:none; padding:4px;" onclick="deleteCategory(${index})">×</button>
                    </div>
                `;
                catListElement.appendChild(li);
            });
        }

        function moveCategory(index, direction) {
            const currentCatList = getActiveMarket().categories;
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= currentCatList.length) return;
            
            [currentCatList[index], currentCatList[targetIndex]] = [currentCatList[targetIndex], currentCatList[index]];
            pushToCloud();
        }

        function addCategory() {
            const input = document.getElementById('newCatInput');
            const text = input.value.trim();
            const currentCatList = getActiveMarket().categories;
            if (text !== '' && !currentCatList.includes(text)) {
                currentCatList.push(text);
                input.value = '';
                pushToCloud();
            }
        }

        function deleteCategory(index) {
            getActiveMarket().categories.splice(index, 1);
            pushToCloud();
        }

        function renderList() {
            const container = document.getElementById('shoppingListContainer');
            container.innerHTML = ''; 
            const activeMarket = getActiveMarket();

            let totaleEsecuzioneLista = 0;
            let totaleCarrello = 0;

            activeMarket.categories.forEach(reparto => {
                const prodottiNelReparto = activeMarket.items.filter(item => item.category === reparto);

                if (prodottiNelReparto.length > 0) {
                    const header = document.createElement('div');
                    header.className = 'category-header';
                    header.innerText = reparto;
                    container.appendChild(header);

                    // Lista raggruppata elegante
                    const ul = document.createElement('ul');
                    ul.className = 'product-list';
                    prodottiNelReparto.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'product-item';
                        if (item.completed) li.classList.add('completed');

                        const costoTotaleProdotto = item.qty * item.price;
                        totaleEsecuzioneLista += costoTotaleProdotto;
                        if (item.completed) totaleCarrello += costoTotaleProdotto;

                        let infoString = `x${item.qty}`;
                        if (item.price > 0) {
                            infoString += ` (${item.price.toFixed(2)}€ cad. = ${costoTotaleProdotto.toFixed(2)}€)`;
                        }

                        li.innerHTML = `
                            <button class="check-btn" onclick="toggleItem(${item.id})"></button>
                            <span class="item-text" onclick="toggleItem(${item.id})">${item.name}</span>
                            <span class="item-details">${infoString}</span>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
                        `;
                        ul.appendChild(li);
                    });
                    container.appendChild(ul);
                }
            });

            const budgetDashboard = document.getElementById('budgetDashboard');
            if (activeMarket.items.length > 0) {
                budgetDashboard.style.display = 'block';
                document.getElementById('estimatedTotal').innerText = `${totaleEsecuzioneLista.toFixed(2)} €`;
                document.getElementById('cartTotal').innerText = `${totaleCarrello.toFixed(2)} €`;
            } else {
                budgetDashboard.style.display = 'none';
            }

            const haProdottiCompletati = activeMarket.items.some(item => item.completed);
            const haProdottiInTotale = activeMarket.items.length > 0;

            document.getElementById('clearCompletedBtn').style.display = 'block';
            document.getElementById('resetAllBtn').style.display = 'block';
            
            document.getElementById('clearCompletedBtn').style.opacity = haProdottiCompletati ? '1' : '0.2';
            document.getElementById('clearCompletedBtn').style.pointerEvents = haProdottiCompletati ? 'auto' : 'none';
            document.getElementById('resetAllBtn').style.opacity = haProdottiInTotale ? '1' : '0.2';
            document.getElementById('resetAllBtn').style.pointerEvents = haProdottiInTotale ? 'auto' : 'none';
        }

        function addItem() {
            const input = document.getElementById('itemInput');
            const categorySelect = document.getElementById('categoryInput');
            const qtyInput = document.getElementById('qtyInput');
            const priceInput = document.getElementById('priceInput');
            
            const text = input.value.trim();
            const qty = parseInt(qtyInput.value) || 1;
            const price = parseFloat(priceInput.value) || 0;
            
            if (text !== '' && categorySelect.value) {
                const activeMarket = getActiveMarket();
                
                if (!activeMarket.history) activeMarket.history = {};
                if (!activeMarket.history[text]) {
                    activeMarket.history[text] = { category: categorySelect.value, count: 0, price: price };
                }
                activeMarket.history[text].count += 1;
                if(price > 0) activeMarket.history[text].price = price;

                activeMarket.items.push({ 
                    id: Date.now(), 
                    name: text, 
                    category: categorySelect.value,
                    qty: qty,
                    price: price,
                    completed: false 
                });
                
                input.value = ''; 
                qtyInput.value = '1';
                priceInput.value = '';
                pushToCloud();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') addItem();
        }

        function toggleItem(id) {
            const activeItems = getActiveMarket().items;
            const index = activeItems.findIndex(item => item.id === id);
            if (index !== -1) {
                activeItems[index].completed = !activeItems[index].completed;
                pushToCloud();
            }
        }

        function deleteItem(id) {
            const activeItems = getActiveMarket().items;
            const index = activeItems.findIndex(item => item.id === id);
            if (index !== -1) {
                activeItems.splice(index, 1);
                pushToCloud();
            }
        }

        function clearCompleted() {
            const activeMarket = getActiveMarket();
            activeMarket.items = activeMarket.items.filter(item => !item.completed);
            pushToCloud();
        }

        function resetAllList() {
            if (confirm(`Vuoi azzerare la lista di "${localState.currentMarket}"?`)) {
                getActiveMarket().items = [];
                pushToCloud();
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registrato!', reg))
                    .catch(err => console.error('Errore SW', err));
            });
        }
    </script>
</body>
</html>
