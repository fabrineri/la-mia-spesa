<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SuperSpesa Pro Cloud 🛒</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0B0E14">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0F1319 0%, #080A0F 100%);
            --panel-bg: rgba(22, 28, 38, 0.8);
            --panel-border: rgba(255, 255, 255, 0.05);
            --text-main: #FFFFFF;
            --text-muted: #8E9AA8;
            --neon-blue: #00E5FF;
            --neon-purple: #9D4EDD;
            --neon-green: #39FF14;
            --neon-red: #FF3131;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 16px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin-bottom: 40px;
            display: none; /* Nascosto fino all'avvenuta autenticazione */
        }

        /* SCHERMATA LOGIN DI SICUREZZA */
        .login-screen {
            width: 100%;
            max-width: 400px;
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-top: 10px;
            margin-bottom: 6px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-container {
            margin-bottom: 24px;
            text-align: center;
            display: none;
        }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            height: 10px;
            width: 100%;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 12px var(--neon-blue);
            border-radius: 20px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            color: var(--neon-blue);
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            position: relative;
        }

        input[type="text"], input[type="number"], input[type="email"], input[type="password"], select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, select:focus {
            border-color: var(--neon-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        #itemInput { flex: 2; min-width: 120px; }
        #categoryInput { flex: 1.3; min-width: 110px; background-color: #161C26; }
        #qtyInput { width: 75px; text-align: center; }
        #priceInput { width: 95px; }

        .voice-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            width: 52px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .voice-btn.listening {
            border-color: var(--neon-red);
            background: rgba(255, 49, 49, 0.15);
            box-shadow: 0 0 15px rgba(255, 49, 49, 0.4);
            animation: pulse-border 1.5s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(255, 49, 49, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 49, 49, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 49, 49, 0); }
        }

        button.add-btn, button.login-btn {
            background: linear-gradient(135deg, var(--neon-blue), #00A3FF);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button.add-btn { width: 52px; font-size: 22px; display: flex; align-items: center; justify-content: center; }
        button.add-btn:active, button.login-btn:active { transform: scale(0.95); opacity: 0.9; }

        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #121824;
            border: 1px solid var(--neon-blue);
            border-radius: 16px;
            z-index: 99999;
            max-height: 240px;
            overflow-y: auto;
            display: none;
        }

        .suggestion-item {
            padding: 15px 16px;
            cursor: pointer;
            font-size: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .frequent-chips-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .frequent-chip {
            background: rgba(157, 78, 221, 0.12);
            color: #D6A4FF;
            border: 1px solid rgba(157, 78, 221, 0.2);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .category-manager-title {
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-manager-content { display: none; margin-top: 14px; }
        .category-manager-content.open { display: block; }
        .cat-list { display: flex; flex-direction: column; gap: 8px; padding: 0; list-style: none; }
        
        .cat-chip {
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .cat-chip.has-items { border-color: rgba(0, 229, 255, 0.3); background: rgba(0, 229, 255, 0.03); }
        .cat-badge { font-size: 10px; font-weight: bold; background: var(--neon-blue); color: #000; padding: 2px 6px; border-radius: 6px; }

        .cat-actions { display: flex; gap: 14px; align-items: center; }
        .move-btn { background: none; border: none; color: var(--neon-blue); cursor: pointer; }
        .move-btn:disabled { color: #3A4454; }

        .category-header {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--neon-blue);
            margin: 24px 0 8px 6px;
        }

        .product-list {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            padding: 4px 14px;
            margin-bottom: 12px;
            list-style: none;
        }

        li.product-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        li.product-item:last-child { border-bottom: none; }
        .item-text { flex: 1; font-size: 16px; margin-left: 14px; cursor: pointer; }
        .item-details { font-size: 13px; color: var(--text-muted); margin-right: 12px; }

        .check-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 26px;
            height: 26px;
            cursor: pointer;
        }

        .completed .check-btn { background: var(--neon-green); border-color: var(--neon-green); }
        .completed .check-btn::after { content: "✓"; color: #000; font-size: 15px; font-weight: 900; display: block; text-align: center; line-height: 22px; }
        .completed .item-text { text-decoration: line-through; color: var(--text-muted); }

        .delete-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; }

        .budget-dashboard {
            background: linear-gradient(135deg, rgba(22, 28, 38, 0.95), rgba(12, 16, 24, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 16px;
            margin-top: 24px;
            display: none;
        }
        .budget-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 8px; color: var(--text-muted); }
        .budget-row.total-highlight { font-size: 18px; font-weight: 700; color: white; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 10px; margin-top: 10px; }
        .success-text { color: var(--neon-green); }

        .action-buttons-container { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        .clear-btn { flex: 1; border: 1px solid transparent; border-radius: 14px; padding: 14px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; }
        #clearCompletedBtn { background: rgba(0, 229, 255, 0.08); border-color: rgba(0, 229, 255, 0.2); color: var(--neon-blue); }
        #resetAllBtn { background: rgba(255, 49, 49, 0.08); border-color: rgba(255, 49, 49, 0.2); color: var(--neon-red); }
        .logout-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); width: 100%; margin-top: 10px; }
        
        .delete-cat-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; width: 52px; color: var(--text-muted); cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <h1 style="margin-bottom: 24px;">SuperSpesa Pro Private 🔒</h1>
        <div class="glass-panel">
            <div class="section-title">Accesso Richiesto</div>
            <div class="input-group" style="flex-direction: column; gap: 14px;">
                <input type="email" id="loginEmail" placeholder="Email privata">
                <input type="password" id="loginPassword" placeholder="Password">
                <button class="login-btn" onclick="handleLogin()">Accedi alla Lista</button>
            </div>
            <div id="loginError" style="color: var(--neon-red); font-size: 13px; text-align: center; margin-top: 10px; display: none;"></div>
        </div>
    </div>

    <div class="container" id="appContainer">
        <h1>SuperSpesa Pro Cloud 🛒</h1>
        
        <div class="progress-container" id="progressZone">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressLabel">0 / 0 prodotti nel carrello (0%)</div>
        </div>
        
        <div class="glass-panel">
            <div class="section-title">Supermercato Corrente</div>
            <div class="input-group" style="margin-bottom: 0;">
                <select id="marketSelect" style="flex: 1;" onchange="changeMarket()"></select>
                <button class="delete-cat-btn" onclick="deleteMarket()">🗑️</button>
            </div>
            
            <div class="section-title" style="margin-top: 16px; margin-bottom: 8px;">Nuovo Negozio</div>
            <div class="input-group" style="margin-bottom: 0;">
                <input type="text" id="newMarketInput" style="flex: 1;" placeholder="Es: Esselunga, Conad...">
                <button class="add-btn" style="background: linear-gradient(135deg, var(--neon-green), #22C55E);" onclick="addMarket()">+</button>
            </div>
        </div>
        
        <div class="glass-panel" style="padding: 16px 20px;">
            <div class="category-manager-title" onclick="toggleCatManager()">
                <span style="color: #9D4EDD; font-weight: 700;">⚙️ Configura Ordine Corsie</span>
                <span id="panelsign" style="color: var(--text-muted);">▶</span>
            </div>
            <div class="category-manager-content" id="catContent">
                <div class="input-group" style="margin-top: 10px; margin-bottom: 0;">
                    <input type="text" id="newCatInput" style="flex: 1;" placeholder="Nuovo reparto...">
                    <button class="add-btn" style="background: linear-gradient(135deg, var(--neon-purple), #7B2CBF); color: white;" onclick="addCategory()">+</button>
                </div>
                <ul class="cat-list" id="customCatList"></ul>
            </div>
        </div>

        <div class="glass-panel">
            <div class="section-title">Aggiungi Prodotto</div>
            <div class="input-group">
                <input type="text" id="itemInput" placeholder="Cosa ti serve?" autocomplete="off" autocorrect="off" spellcheck="false">
                <button id="voiceBtn" class="voice-btn" onclick="startVoiceRecognition()">🎙️</button>
                <select id="categoryInput"></select>
                <div id="autocompleteList" class="autocomplete-suggestions"></div>
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <input type="number" id="qtyInput" placeholder="Qtà" min="1" value="1">
                <input type="number" id="priceInput" placeholder="Prezzo (€)" min="0" step="0.01">
                <button class="add-btn" style="flex: 1;" onclick="addItem()">+</button>
            </div>
        </div>

        <div class="frequent-products-zone" id="frequentZone" style="display: none; margin: 0 6px 16px 6px;">
            <div class="section-title" style="color: #9D4EDD;">⭐ Comprati Spesso:</div>
            <div class="frequent-chips-container" id="frequentChips"></div>
        </div>

        <div id="shoppingListContainer"></div>

        <div class="budget-dashboard" id="budgetDashboard">
            <div class="budget-row">
                <span>Totale stimato lista:</span>
                <span style="color: white; font-weight: 500;" id="estimatedTotal">0.00 €</span>
            </div>
            <div class="budget-row total-highlight">
                <span>Nel Carrello:</span>
                <span class="success-text" id="cartTotal">0.00 €</span>
            </div>
        </div>

        <div class="action-buttons-container">
            <button id="clearCompletedBtn" class="clear-btn" onclick="clearCompleted()">Svuota Carrello 🧹</button>
            <button id="resetAllBtn" class="clear-btn" onclick="resetAllList()">Azzera Lista 🗑️</button>
            <button class="clear-btn logout-btn" onclick="handleLogout()">Esci dall'account 🚪</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNbOMzuz-KvWp7krS-cWgSKpIq5cz1nZc",
            authDomain: "superspesa-2d469.firebaseapp.com",
            projectId: "superspesa-2d469",
            storageBucket: "superspesa-2d469.firebasestorage.app",
            messagingSenderId: "513253865523",
            appId: "1:513253865523:web:f4f8c8caaef2c5c1dd4b46"
        };

        firebase.initializeApp(firebaseConfig);
        const firestoreDB = firebase.firestore();
        const auth = firebase.auth();
        const docRef = firestoreDB.collection("appData").doc("shoppingState");

        // CATEGORIE DI DEFAULT AGGIORNATE CON FLAMINIA
        const defaultCategories = [
            "Ortofrutta 🍎", "Pane e Forno 🥖", "Dispensa 🍝", 
            "Carne e Pesce 🥩", "Latticini e Frigo ➔ 🧀", "Bevande 💧", 
            "Igiene e Casa 🧻", "Surgelati 🧊", "Flaminia 🎀"
        ];

        const smartDictionary = [
            { name: "Mele", cat: "Ortofrutta 🍎", price: 1.99 }, { name: "Banane", cat: "Ortofrutta 🍎", price: 1.49 }, { name: "Insalata", cat: "Ortofrutta 🍎", price: 1.19 }, { name: "Pomodori", cat: "Ortofrutta 🍎", price: 2.49 },
            { name: "Pane", cat: "Pane e Forno 🥖", price: 1.20 }, { name: "Biscotti", cat: "Pane e Forno 🥖", price: 2.80 }, { name: "Crackers", cat: "Pane e Forno 🥖", price: 1.40 }, { name: "Cornetti", cat: "Pane e Forno 🥖", price: 2.50 },
            { name: "Pasta", cat: "Dispensa 🍝", price: 0.85 }, { name: "Riso", cat: "Dispensa 🍝", price: 1.99 }, { name: "Passata di pomodoro", cat: "Dispensa 🍝", price: 0.99 }, { name: "Olio d'oliva", cat: "Dispensa 🍝", price: 7.49 }, { name: "Zucchero", cat: "Dispensa 🍝", price: 1.25 }, { name: "Caffè", cat: "Dispensa 🍝", price: 3.20 },
            { name: "Petto di Pollo", cat: "Carne e Pesce 🥩", price: 6.50 }, { name: "Macinato", cat: "Carne e Pesce 🥩", price: 5.90 }, { name: "Salmone", cat: "Carne e Pesce 🥩", price: 8.90 }, { name: "Prosciutto", cat: "Carne e Pesce 🥩", price: 2.99 },
            { name: "Latte", cat: "Latticini e Frigo 🧀", price: 1.39 }, { name: "Mozzarella", cat: "Latticini e Frigo 🧀", price: 1.10 }, { name: "Yogurt", cat: "Latticini e Frigo 🧀", price: 0.99 }, { name: "Burro", cat: "Latticini e Frigo 🧀", price: 2.20 }, { name: "Uova", cat: "Latticini e Frigo 🧀", price: 1.89 },
            { name: "Acqua Naturale", cat: "Bevande 💧", price: 0.35 }, { name: "Acqua Frizzante", cat: "Bevande 💧", price: 0.35 }, { name: "Birra", cat: "Bevande 💧", price: 1.50 }, { name: "Vino", cat: "Bevande 💧", price: 4.50 }, { name: "Succo di frutta", cat: "Bevande 💧", price: 1.69 },
            { name: "Carta Igienica", cat: "Igiene e Casa 🧻", price: 3.50 }, { name: "Scottex", cat: "Igiene e Casa 🧻", price: 2.40 }, { name: "Sapone Piatti", cat: "Igiene e Casa 🧻", price: 1.80 }, { name: "Dentifricio", cat: "Igiene e Casa 🧻", price: 2.10 }, { name: "Sacco Spazzatura", cat: "Igiene e Casa 🧻", price: 1.50 },
            { name: "Gelato", cat: "Surgelati 🧊", price: 3.99 }, { name: "Piselli surgelati", cat: "Surgelati 🧊", price: 1.79 }, { name: "Pizza surgelata", cat: "Surgelati 🧊", price: 2.99 }, { name: "Bastoncini di pesce", cat: "Surgelati 🧊", price: 3.49 }
        ];

        let localState = {
            currentMarket: "Supermercato Standard",
            markets: {
                "Supermercato Standard": { categories: [...defaultCategories], items: [], history: {} }
            }
        };

        let unsubscribeFirestore = null;

        // CONTROLLO DELLO STATO DI LOGIN DI FIREBASE
        auth.onAuthStateChanged((user) => {
            const loginScreen = document.getElementById('loginScreen');
            const appContainer = document.getElementById('appContainer');
            
            if (user) {
                // Utente loggato con successo
                loginScreen.style.display = 'none';
                appContainer.style.display = 'block';
                
                // Attiva la sincronizzazione Cloud in tempo reale
                unsubscribeFirestore = docRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        localState = doc.data();
                    } else {
                        docRef.set(localState);
                    }
                    updateMarketSelectorUI();
                    updateCategoryUI();
                    renderList();
                    renderFrequentChips();
                }, (error) => {
                    console.error("Errore Firestore:", error);
                });
            } else {
                // Utente non autenticato o disconnesso
                loginScreen.style.display = 'flex';
                appContainer.style.display = 'none';
                if (unsubscribeFirestore) {
                    unsubscribeFirestore();
                    unsubscribeFirestore = null;
                }
            }
        });

        // GESTIONE AZIONE DI LOGIN
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.innerText = "Inserisci sia l'email che la password.";
                errorDiv.style.display = 'block';
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .catch((error) => {
                    errorDiv.innerText = "Accesso negato. Credenziali errate.";
                    errorDiv.style.display = 'block';
                });
        }

        // DISCONNESSIONE DALL'ACCOUNT
        function handleLogout() {
            if(confirm("Vuoi disconnetterti da questo dispositivo?")) {
                auth.signOut();
            }
        }

        // MANI IMPEGNATE / DETTATURA
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
            } catch (err) { console.log("Wake Lock negato"); }
        }
        document.addEventListener('touchstart', requestWakeLock, { once: true });
        document.addEventListener('click', requestWakeLock, { once: true });

        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Dettatura vocale non supportata."); return; }
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'it-IT';
            
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.classList.add('listening');
            triggerHapticFeedback();

            recognition.start();

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                const formattedText = speechToText.charAt(0).toUpperCase() + speechToText.slice(1);
                document.getElementById('itemInput').value = formattedText;
                searchAutocomplete(); 
            };

            recognition.onend = () => { voiceBtn.classList.remove('listening'); };
            recognition.onerror = () => { voiceBtn.classList.remove('listening'); };
        }

        function triggerHapticFeedback() { if (navigator.vibrate) { navigator.vibrate(15); } }
        function getActiveMarket() { if(!localState.markets[localState.currentMarket].history) { localState.markets[localState.currentMarket].history = {}; } return localState.markets[localState.currentMarket]; }
        function pushToCloud() { if(auth.currentUser) docRef.set(localState); }

        function findEstimatedPriceGlobal(productName) {
            let latestPriceFound = 0;
            Object.keys(localState.markets).forEach(mName => {
                const mHistory = localState.markets[mName].history || {};
                if (mHistory[productName] && mHistory[productName].price > 0) { latestPriceFound = mHistory[productName].price; }
            });
            if (latestPriceFound > 0) return latestPriceFound;
            const defaultMatch = smartDictionary.find(d => d.name.toLowerCase() === productName.toLowerCase());
            return defaultMatch ? defaultMatch.price : 0;
        }

        const itemInput = document.getElementById('itemInput');
        ['input', 'keydown', 'keyup', 'change'].forEach(evt => {
            if(itemInput) { itemInput.addEventListener(evt, () => { searchAutocomplete(); }); }
        });

        function searchAutocomplete() {
            const input = document.getElementById('itemInput');
            const listContainer = document.getElementById('autocompleteList');
            const filter = input.value.trim().toLowerCase();
            const activeCategories = getActiveMarket().categories;

            if (!filter || filter.length < 1) { listContainer.style.display = 'none'; return; }

            const globalHistoryNames = new Set();
            Object.keys(localState.markets).forEach(mName => {
                Object.keys(localState.markets[mName].history || {}).forEach(name => globalHistoryNames.add(name));
            });

            const combinedDictionary = [...smartDictionary];
            globalHistoryNames.forEach(histName => {
                if(!combinedDictionary.some(d => d.name.toLowerCase() === histName.toLowerCase())) {
                    let foundCat = defaultCategories[2];
                    Object.keys(localState.markets).forEach(mName => {
                        if(localState.markets[mName].history[histName]) foundCat = localState.markets[mName].history[histName].category;
                    });
                    combinedDictionary.push({ name: histName, cat: foundCat });
                }
            });

            const matches = combinedDictionary.filter(item => item.name.toLowerCase().includes(filter) && activeCategories.includes(item.cat)).slice(0, 5);

            if (matches.length > 0) {
                listContainer.innerHTML = '';
                listContainer.style.display = 'block';
                matches.forEach(match => {
                    const estimatedPrice = findEstimatedPriceGlobal(match.name);
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `<span>${match.name} ${estimatedPrice > 0 ? `(~${estimatedPrice.toFixed(2)}€)` : ''}</span><span style="font-size:11px; color:var(--text-muted); background:rgba(255,255,255,0.06); padding:4px 8px; border-radius:8px;">${match.cat}</span>`;
                    
                    const selectThis = (e) => { e.preventDefault(); e.stopPropagation(); selectSuggestion(match.name, match.cat); };
                    div.addEventListener('touchstart', selectThis, { passive: false });
                    div.addEventListener('mousedown', selectThis);
                    listContainer.appendChild(div);
                });
            } else { listContainer.style.display = 'none'; }
        }

        function selectSuggestion(name, category) {
            document.getElementById('itemInput').value = name;
            document.getElementById('categoryInput').value = category;
            document.getElementById('autocompleteList').style.display = 'none';
            const estPrice = findEstimatedPriceGlobal(name);
            document.getElementById('priceInput').value = estPrice > 0 ? estPrice : '';
            document.getElementById('itemInput').blur();
            triggerHapticFeedback();
        }

        function renderFrequentChips() {
            const container = document.getElementById('frequentChips');
            const zone = document.getElementById('frequentZone');
            const history = getActiveMarket().history || {};
            const activeCategories = getActiveMarket().categories;

            const sortedHistory = Object.keys(history)
                .map(name => ({ name: name, ...history[name] }))
                .filter(item => activeCategories.includes(item.category))
                .sort((a, b) => b.count - a.count)
                .slice(0, 6);

            if (sortedHistory.length > 0) {
                zone.style.display = 'block';
                container.innerHTML = '';
                sortedHistory.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'frequent-chip';
                    const currentEst = findEstimatedPriceGlobal(item.name);
                    btn.innerText = `+ ${item.name} ${currentEst > 0 ? `(${currentEst.toFixed(2)}€)` : ''}`;
                    btn.onclick = () => {
                        triggerHapticFeedback();
                        getActiveMarket().items.push({ id: Date.now(), name: item.name, category: item.category, qty: 1, price: currentEst || 0, completed: false });
                        pushToCloud();
                    };
                    container.appendChild(btn);
                });
            } else { zone.style.display = 'none'; }
        }

        document.addEventListener('click', (e) => {
            if (e.target.id !== 'itemInput' && e.target.className !== 'suggestion-item' && e.target.id !== 'voiceBtn') {
                const ac = document.getElementById('autocompleteList');
                if(ac) ac.style.display = 'none';
            }
        });

        function updateMarketSelectorUI() {
            const select = document.getElementById('marketSelect');
            select.innerHTML = '';
            Object.keys(localState.markets).forEach(marketName => {
                const opt = document.createElement('option');
                opt.value = marketName; opt.innerText = marketName;
                if(marketName === localState.currentMarket) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function changeMarket() { localState.currentMarket = document.getElementById('marketSelect').value; pushToCloud(); }
        function addMarket() {
            const input = document.getElementById('newMarketInput');
            const name = input.value.trim();
            if (name !== '' && !localState.markets[name]) {
                triggerHapticFeedback();
                localState.markets[name] = { categories: [...defaultCategories], items: [], history: {} };
                localState.currentMarket = name;
                input.value = ''; pushToCloud();
            }
        }

        function deleteMarket() {
            if (Object.keys(localState.markets).length <= 1) { alert("Devi avere almeno un supermercato attivo!"); return; }
            if (confirm(`Vuoi davvero eliminare "${localState.currentMarket}"?`)) {
                delete localState.markets[localState.currentMarket];
                localState.currentMarket = Object.keys(localState.markets)[0];
                pushToCloud();
            }
        }

        function toggleCatManager() {
            const content = document.getElementById('catContent');
            const sign = document.getElementById('panelsign');
            content.classList.toggle('open');
            sign.innerText = content.classList.contains('open') ? "▼" : "▶";
        }

        function updateCategoryUI() {
            const select = document.getElementById('categoryInput');
            const catListElement = document.getElementById('customCatList');
            const currentCatList = getActiveMarket().categories;
            const currentItems = getActiveMarket().items || [];
            
            const savedSelection = select.value;
            select.innerHTML = '';
            currentCatList.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat; opt.innerText = cat;
                select.appendChild(opt);
            });
            if(savedSelection && currentCatList.includes(savedSelection)) select.value = savedSelection;

            catListElement.innerHTML = '';
            currentCatList.forEach((cat, index) => {
                const li = document.createElement('li');
                const countInCat = currentItems.filter(item => item.category === cat).length;
                li.className = countInCat > 0 ? 'cat-chip has-items' : 'cat-chip';
                
                li.innerHTML = `
                    <div><span>${cat}</span>${countInCat > 0 ? `<span class="cat-badge">${countInCat} pr.</span>` : ''}</div>
                    <div class="cat-actions">
                        <button class="move-btn" onclick="moveCategory(${index}, -1)" ${index === 0 ? 'disabled' : ''}>▲</button>
                        <button class="move-btn" onclick="moveCategory(${index}, 1)" ${index === currentCatList.length - 1 ? 'disabled' : ''}>▼</button>
                        <button class="delete-cat-btn" style="border:none; background:none; padding:4px;" onclick="deleteCategory(${index})">×</button>
                    </div>`;
                catListElement.appendChild(li);
            });
        }

        function moveCategory(index, direction) {
            const currentCatList = getActiveMarket().categories;
            [currentCatList[index], currentCatList[index + direction]] = [currentCatList[index + direction], currentCatList[index]];
            pushToCloud();
        }

        function addCategory() {
            const input = document.getElementById('newCatInput');
            const text = input.value.trim();
            if (text !== '' && !getActiveMarket().categories.includes(text)) {
                getActiveMarket().categories.push(text);
                input.value = ''; pushToCloud();
            }
        }

        function deleteCategory(index) { getActiveMarket().categories.splice(index, 1); pushToCloud(); }

        function renderList() {
            const container = document.getElementById('shoppingListContainer');
            container.innerHTML = ''; 
            const activeMarket = getActiveMarket();

            let totaleEsecuzioneLista = 0;
            let totaleCarrello = 0;
            
            let totaleProdottiDellaLista = activeMarket.items.length;
            let prodottiCompletatiCarrello = activeMarket.items.filter(item => item.completed).length;

            const progressZone = document.getElementById('progressZone');
            const progressBar = document.getElementById('progressBar');
            const progressLabel = document.getElementById('progressLabel');

            if (totaleProdottiDellaLista > 0) {
                progressZone.style.display = 'block';
                let percentuale = Math.round((prodottiCompletatiCarrello / totaleProdottiDellaLista) * 100);
                progressBar.style.width = `${percentuale}%`;
                progressLabel.innerText = `${prodottiCompletatiCarrello} / ${totaleProdottiDellaLista} prodotti nel carrello (${percentuale}%)`;
            } else { progressZone.style.display = 'none'; }

            activeMarket.categories.forEach(reparto => {
                const prodottiNelReparto = activeMarket.items.filter(item => item.category === reparto);

                if (prodottiNelReparto.length > 0) {
                    const header = document.createElement('div');
                    header.className = 'category-header'; header.innerText = reparto;
                    container.appendChild(header);

                    const ul = document.createElement('ul');
                    ul.className = 'product-list';
                    prodottiNelReparto.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'product-item';
                        if (item.completed) li.classList.add('completed');

                        const costoTotaleProdotto = item.qty * item.price;
                        totaleEsecuzioneLista += costoTotaleProdotto;
                        if (item.completed) totaleCarrello += costoTotaleProdotto;

                        let infoString = `x${item.qty}`;
                        if (item.price > 0) { infoString += ` (${item.price.toFixed(2)}€ cad. = ${costoTotaleProdotto.toFixed(2)}€)`; }

                        li.innerHTML = `
                            <button class="check-btn" onclick="toggleItem(${item.id})"></button>
                            <span class="item-text" onclick="toggleItem(${item.id})">${item.name}</span>
                            <span class="item-details">${infoString}</span>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
                        `;
                        ul.appendChild(li);
                    });
                    container.appendChild(ul);
                }
            });

            const budgetDashboard = document.getElementById('budgetDashboard');
            if (activeMarket.items.length > 0) {
                budgetDashboard.style.display = 'block';
                document.getElementById('estimatedTotal').innerText = `${totaleEsecuzioneLista.toFixed(2)} €`;
                document.getElementById('cartTotal').innerText = `${totaleCarrello.toFixed(2)} €`;
            } else { budgetDashboard.style.display = 'none'; }

            const haProdottiCompletati = activeMarket.items.some(item => item.completed);
            const haProdottiInTotale = activeMarket.items.length > 0;

            document.getElementById('clearCompletedBtn').style.display = 'block';
            document.getElementById('resetAllBtn').style.display = 'block';
            document.getElementById('clearCompletedBtn').style.opacity = haProdottiCompletati ? '1' : '0.2';
            document.getElementById('clearCompletedBtn').style.pointerEvents = haProdottiCompletati ? 'auto' : 'none';
            document.getElementById('resetAllBtn').style.opacity = haProdottiInTotale ? '1' : '0.2';
            document.getElementById('resetAllBtn').style.pointerEvents = haProdottiInTotale ? 'auto' : 'none';
        }

        function addItem() {
            const input = document.getElementById('itemInput');
            const categorySelect = document.getElementById('categoryInput');
            const qtyInput = document.getElementById('qtyInput');
            const priceInput = document.getElementById('priceInput');
            
            const text = input.value.trim();
            const qty = parseInt(qtyInput.value) || 1;
            const price = parseFloat(priceInput.value) || 0;
            
            if (text !== '' && categorySelect.value) {
                triggerHapticFeedback();
                const activeMarket = getActiveMarket();
                
                if (!activeMarket.history) activeMarket.history = {};
                if (!activeMarket.history[text]) { activeMarket.history[text] = { category: categorySelect.value, count: 0, price: price }; }
                activeMarket.history[text].count += 1;
                if(price > 0) activeMarket.history[text].price = price;

                activeMarket.items.push({ id: Date.now(), name: text, category: categorySelect.value, qty: qty, price: price, completed: false });
                input.value = ''; qtyInput.value = '1'; priceInput.value = '';
                pushToCloud();
            }
        }

        function toggleItem(id) {
            triggerHapticFeedback();
            const activeItems = getActiveMarket().items;
            const index = activeItems.findIndex(item => item.id === id);
            if (index !== -1) { activeItems[index].completed = !activeItems[index].completed; pushToCloud(); }
        }

        function deleteItem(id) {
            const activeItems = getActiveMarket().items;
            const index = activeItems.findIndex(item => item.id === id);
            if (index !== -1) { activeItems.splice(index, 1); pushToCloud(); }
        }

        function clearCompleted() {
            getActiveMarket().items = getActiveMarket().items.filter(item => !item.completed);
            pushToCloud();
        }

        function resetAllList() {
            if (confirm(`Vuoi azzerare la lista?`)) { getActiveMarket().items = []; pushToCloud(); }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('service-worker.js').catch(err => console.error('Errore SW', err)); });
        }
    </script>
</body>
</html>
